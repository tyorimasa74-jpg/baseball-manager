<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>草野球マネージャー</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f5f5f0; min-height: 100vh; }

.app { max-width: 430px; margin: 0 auto; background: #f5f5f0; min-height: 100vh; padding-bottom: 80px; }

.header {
  background: #1a3a2a;
  color: #e8f5e1;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-icon { font-size: 24px; }
.header-title { font-size: 19px; font-weight: 600; letter-spacing: 0.5px; }
.header-sub { font-size: 12px; color: #9ec48a; margin-top: 2px; }
.sync-badge {
  margin-left: auto;
  font-size: 11px;
  background: #2d5a3d;
  color: #9ec48a;
  padding: 4px 8px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.sync-dot {
  width: 6px; height: 6px;
  background: #4caf50;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.tab-bar {
  display: flex;
  background: #fff;
  border-bottom: 1px solid #e0e0e0;
  position: sticky;
  top: 0;
  z-index: 100;
}
.tab {
  flex: 1;
  padding: 13px 4px;
  font-size: 12px;
  font-weight: 600;
  color: #888;
  background: none;
  border: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  font-family: inherit;
}
.tab.active { color: #1a3a2a; border-bottom-color: #1a3a2a; }

.section { display: none; padding: 16px; }
.section.active { display: block; }

.card {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
}

.section-label {
  font-size: 11px;
  font-weight: 700;
  color: #888;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
  margin-top: 4px;
}

.player-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid #f0f0f0;
}
.player-row:last-child { border-bottom: none; }
.player-num {
  width: 30px; height: 30px;
  background: #1a3a2a; color: #9ec48a;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; flex-shrink: 0;
}
.player-info { flex: 1; }
.player-name { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.player-pos { font-size: 11px; color: #888; margin-top: 1px; }
.player-avg { font-size: 18px; font-weight: 700; color: #1a3a2a; min-width: 52px; text-align: right; }
.avg-label { font-size: 10px; color: #aaa; text-align: right; }
.delete-btn {
  background: none; border: none; color: #ccc;
  font-size: 18px; cursor: pointer; padding: 4px; line-height: 1;
}

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-card { background: #fff; border-radius: 12px; padding: 14px; text-align: center; border: 1px solid #e8e8e8; }
.stat-val { font-size: 26px; font-weight: 700; color: #1a3a2a; }
.stat-lbl { font-size: 11px; color: #888; margin-top: 3px; }

.add-form { display: flex; flex-direction: column; gap: 10px; }
.add-form input, .add-form select {
  padding: 11px 13px;
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  background: #fafafa;
  color: #1a1a1a;
  font-size: 15px;
  font-family: inherit;
  width: 100%;
  -webkit-appearance: none;
}
.add-form input:focus, .add-form select:focus {
  outline: none;
  border-color: #1a3a2a;
  background: #fff;
}
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.row4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }
.form-hint { font-size: 12px; color: #888; }

.btn-primary {
  background: #1a3a2a; color: #e8f5e1;
  border: none; border-radius: 12px;
  padding: 13px; font-size: 15px; font-weight: 600;
  cursor: pointer; width: 100%; font-family: inherit;
  transition: opacity 0.15s;
}
.btn-primary:active { opacity: 0.75; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.lineup-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 13px;
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 12px;
  margin-bottom: 8px;
}
.order-badge {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0; color: #fff;
}
.order-1 { background: #c4932a; }
.order-2 { background: #888; }
.order-3 { background: #a06028; }
.order-4 { background: #1a3a2a; }
.order-other { background: #3a6a4a; }
.lineup-name { font-size: 15px; font-weight: 600; color: #1a1a1a; flex: 1; }
.lineup-detail { font-size: 11px; color: #888; margin-top: 1px; }
.lineup-avg { font-size: 16px; font-weight: 700; color: #1a3a2a; }

.ai-btn {
  width: 100%; padding: 15px;
  background: #1a3a2a; color: #e8f5e1;
  border: none; border-radius: 14px;
  font-size: 15px; font-weight: 600;
  cursor: pointer; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: inherit; transition: opacity 0.15s;
}
.ai-btn:active { opacity: 0.75; }

.ai-reason {
  background: #f0f7ec;
  border: 1px solid #9ec48a;
  border-radius: 12px;
  padding: 14px;
  font-size: 13px;
  color: #1a4a2a;
  line-height: 1.7;
  margin-bottom: 16px;
  display: none;
}

.game-log { margin-bottom: 12px; }
.game-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px;
  background: #1a3a2a;
  border-radius: 12px 12px 0 0;
  color: #e8f5e1;
}
.game-date { font-size: 11px; color: #9ec48a; margin-top: 2px; }
.game-score { font-size: 20px; font-weight: 700; }
.game-result { font-size: 12px; font-weight: 600; }
.win { color: #9ec48a; }
.lose { color: #f4948a; }
.game-body {
  background: #fff;
  border: 1px solid #e8e8e8; border-top: none;
  border-radius: 0 0 12px 12px;
  padding: 10px 14px;
}
.game-stats { display: flex; gap: 16px; font-size: 12px; color: #666; flex-wrap: wrap; }

.video-upload {
  background: #fff;
  border: 2px dashed #c8e4bc;
  border-radius: 14px;
  padding: 28px 20px;
  text-align: center;
  cursor: pointer;
  margin-bottom: 12px;
}
.video-icon { font-size: 36px; margin-bottom: 10px; }
.video-text { font-size: 15px; font-weight: 600; color: #1a3a2a; }
.video-sub { font-size: 12px; color: #888; margin-top: 4px; }

.youtube-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
.youtube-form input {
  padding: 11px 13px;
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  background: #fafafa;
  color: #1a1a1a;
  font-size: 14px;
  font-family: inherit;
}
.youtube-form input:focus { outline: none; border-color: #1a3a2a; }

.video-list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid #f0f0f0;
}
.video-list-item:last-child { border-bottom: none; }
.video-thumb {
  width: 68px; height: 50px;
  background: #ff0000; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 20px; flex-shrink: 0;
  text-decoration: none;
}
.video-info { flex: 1; }
.video-title { font-size: 13px; font-weight: 600; color: #1a1a1a; }
.video-meta { font-size: 11px; color: #888; margin-top: 2px; }
.video-link { font-size: 11px; color: #1a3a2a; text-decoration: none; }

.empty-state {
  text-align: center; padding: 32px 16px;
  color: #aaa; font-size: 14px; line-height: 1.8;
}
.empty-icon { font-size: 36px; margin-bottom: 10px; }

.loading-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(26,58,42,0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; flex-direction: column; gap: 16px;
  display: none;
}
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: #e8f5e1; font-size: 14px; }

.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: #1a3a2a; color: #e8f5e1;
  padding: 11px 22px; border-radius: 24px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transition: opacity 0.3s;
  z-index: 999; pointer-events: none;
  white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.toast.show { opacity: 1; }
.error-toast {
  background: #c0392b;
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">読み込み中...</div>
</div>

<div class="app">
  <div class="header">
    <div class="header-icon">⚾</div>
    <div>
      <div class="header-title">草野球マネージャー</div>
      <div class="header-sub">チーム成績・スタメン管理</div>
    </div>
    <div class="sync-badge">
      <div class="sync-dot"></div>
      チーム共有中
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('members')">👤 選手</button>
    <button class="tab" onclick="switchTab('lineup')">📋 打順</button>
    <button class="tab" onclick="switchTab('games')">🏆 試合</button>
    <button class="tab" onclick="switchTab('videos')">🎬 動画</button>
  </div>

  <!-- 選手タブ -->
  <div id="members" class="section active">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-val" id="totalPlayers">-</div>
        <div class="stat-lbl">登録選手数</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="teamAvg">-</div>
        <div class="stat-lbl">チーム打率</div>
      </div>
    </div>

    <p class="section-label">選手一覧</p>
    <div class="card" id="playerList">
      <div class="empty-state"><div class="empty-icon">⚾</div>読み込み中...</div>
    </div>

    <p class="section-label">選手を追加</p>
    <div class="card">
      <div class="add-form">
        <input type="text" id="newName" placeholder="選手名（例：田中 翔）" />
        <div class="row2">
          <select id="newPos">
            <option value="C">捕手 (C)</option>
            <option value="1B">一塁手 (1B)</option>
            <option value="2B">二塁手 (2B)</option>
            <option value="3B">三塁手 (3B)</option>
            <option value="SS" selected>遊撃手 (SS)</option>
            <option value="LF">左翼手 (LF)</option>
            <option value="CF">中堅手 (CF)</option>
            <option value="RF">右翼手 (RF)</option>
            <option value="P">投手 (P)</option>
            <option value="DH">指名打者 (DH)</option>
          </select>
          <input type="number" id="newGames" placeholder="試合数" min="0" />
        </div>
        <p class="form-hint">今シーズン成績（打数 / 安打 / HR / 打点）</p>
        <div class="row4">
          <input type="number" id="newAB" placeholder="打数" min="0" />
          <input type="number" id="newH" placeholder="安打" min="0" />
          <input type="number" id="newHR" placeholder="HR" min="0" />
          <input type="number" id="newRBI" placeholder="打点" min="0" />
        </div>
        <button class="btn-primary" id="addPlayerBtn" onclick="addPlayer()">＋ 選手を追加</button>
      </div>
    </div>
  </div>

  <!-- 打順タブ -->
  <div id="lineup" class="section">
    <button class="ai-btn" onclick="generateLineup()">✦ AIでスタメン打順を提案</button>
    <div class="ai-reason" id="aiReason"></div>
    <p class="section-label" id="lineupLabel">打順表</p>
    <div id="lineupList">
      <div class="empty-state"><div class="empty-icon">📋</div>選手を登録してから<br>「AIで打順を提案」を押してください</div>
    </div>
  </div>

  <!-- 試合タブ -->
  <div id="games" class="section">
    <p class="section-label">試合を記録</p>
    <div class="card">
      <div class="add-form">
        <input type="text" id="gameOpponent" placeholder="対戦相手チーム名" />
        <input type="date" id="gameDate" />
        <div class="row2">
          <input type="number" id="gameOurScore" placeholder="自チーム得点" min="0" />
          <input type="number" id="gameTheirScore" placeholder="相手チーム得点" min="0" />
        </div>
        <div class="row2">
          <input type="number" id="gameHits" placeholder="安打数" min="0" />
          <input type="number" id="gameErrors" placeholder="失策数" min="0" />
        </div>
        <input type="text" id="gameMemo" placeholder="メモ（任意）" />
        <button class="btn-primary" id="addGameBtn" onclick="addGame()">＋ 試合を記録</button>
      </div>
    </div>

    <p class="section-label">試合記録</p>
    <div id="gameList">
      <div class="empty-state"><div class="empty-icon">🏆</div>読み込み中...</div>
    </div>
  </div>

  <!-- 動画タブ -->
  <div id="videos" class="section">
    <p class="section-label">YouTube動画を共有</p>
    <div class="card">
      <div class="youtube-form">
        <input type="text" id="videoTitle" placeholder="動画タイトル（例：vs ライオンズ 7回HR）" />
        <input type="url" id="videoUrl" placeholder="YouTubeのURL（限定公開も可）" />
        <input type="text" id="videoMemo" placeholder="メモ（任意）" />
        <button class="btn-primary" id="addVideoBtn" onclick="addVideo()">＋ 動画を追加</button>
      </div>
    </div>

    <div style="background:#f0f7ec;border:1px solid #9ec48a;border-radius:12px;padding:12px;margin-bottom:12px;font-size:12px;color:#1a4a2a;line-height:1.6;">
      💡 <strong>YouTubeの限定公開の使い方</strong><br>
      YouTubeにアップ→「限定公開」設定→URLをコピーしてここに貼る<br>チームメンバーだけが見られます
    </div>

    <p class="section-label">共有済み動画</p>
    <div class="card" id="videoList">
      <div class="empty-state"><div class="empty-icon">📹</div>読み込み中...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== Supabase設定 =====
var SUPABASE_URL = 'https://howerjqqajkpnuzeuqof.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhvd2VyanFxYWprcG51emV1cW9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzEzNTMsImV4cCI6MjA5Mjg0NzM1M30.AKbnY3EU5n7wSmuTdm79_txYjjiZRiu5466PQfmaI9c';

// ===== API呼び出し =====
async function sbFetch(table, method, body, id) {
  var url = SUPABASE_URL + '/rest/v1/' + table + (id ? '?id=eq.' + id : '');
  var headers = {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Prefer': method === 'POST' ? 'return=representation' : ''
  };
  if (method === 'GET') {
    url = SUPABASE_URL + '/rest/v1/' + table + '?order=created_at.desc';
  }
  var res = await fetch(url, {
    method: method,
    headers: headers,
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    var err = await res.text();
    throw new Error(err);
  }
  if (method === 'DELETE') return;
  return res.json();
}

// ===== ユーティリティ =====
var players = [];
var games = [];
var videos = [];

function avg(p) { return p.ab > 0 ? p.h / p.ab : 0; }
function fmtAvg(p) {
  if (!p.ab || p.ab === 0) return '.---';
  return '.' + String(Math.round(p.h / p.ab * 1000)).padStart(3, '0');
}
function posLabel(pos) {
  var m = { C:'捕手', P:'投手', '1B':'一塁手', '2B':'二塁手', '3B':'三塁手', SS:'遊撃手', LF:'左翼手', CF:'中堅手', RF:'右翼手', DH:'指名打者' };
  return (m[pos] || pos) + ' (' + pos + ')';
}
function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error-toast' : '') + ' show';
  setTimeout(function () { t.classList.remove('show'); }, 2500);
}
function showLoading(text) {
  document.getElementById('loadingText').textContent = text || '処理中...';
  document.getElementById('loadingOverlay').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
}

// ===== タブ切替 =====
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
  document.querySelectorAll('.section').forEach(function (s) { s.classList.remove('active'); });
  document.getElementById(name).classList.add('active');
  var map = { members: 0, lineup: 1, games: 2, videos: 3 };
  document.querySelectorAll('.tab')[map[name]].classList.add('active');
}

// ===== 選手管理 =====
async function loadPlayers() {
  try {
    players = await sbFetch('players', 'GET');
    renderPlayerList();
  } catch(e) {
    document.getElementById('playerList').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div>データ読み込みエラー</div>';
  }
}

async function addPlayer() {
  var name = document.getElementById('newName').value.trim();
  var pos = document.getElementById('newPos').value;
  var ab = parseInt(document.getElementById('newAB').value) || 0;
  var h = parseInt(document.getElementById('newH').value) || 0;
  var hr = parseInt(document.getElementById('newHR').value) || 0;
  var rbi = parseInt(document.getElementById('newRBI').value) || 0;

  if (!name) { showToast('選手名を入力してください', true); return; }
  if (h > ab) { showToast('安打数が打数を超えています', true); return; }

  var btn = document.getElementById('addPlayerBtn');
  btn.disabled = true;
  showLoading('選手を登録中...');
  try {
    var result = await sbFetch('players', 'POST', { name, pos, ab, h, hr, rbi });
    players.unshift(result[0]);
    renderPlayerList();
    ['newName','newAB','newH','newHR','newRBI','newGames'].forEach(function(id){
      var el = document.getElementById(id);
      if (el) el.value = '';
    });
    showToast(name + ' を登録しました ⚾');
  } catch(e) {
    showToast('登録に失敗しました', true);
  }
  btn.disabled = false;
  hideLoading();
}

async function deletePlayer(id, name) {
  if (!confirm(name + ' を削除しますか？')) return;
  showLoading('削除中...');
  try {
    await sbFetch('players', 'DELETE', null, id);
    players = players.filter(function(p) { return p.id !== id; });
    renderPlayerList();
    showToast('削除しました');
  } catch(e) {
    showToast('削除に失敗しました', true);
  }
  hideLoading();
}

function renderPlayerList() {
  var list = document.getElementById('playerList');
  var total = players.length;
  var teamA = total > 0 ? players.reduce(function (s, p) { return s + avg(p); }, 0) / total : 0;
  document.getElementById('totalPlayers').textContent = total;
  document.getElementById('teamAvg').textContent = total > 0 ? '.' + String(Math.round(teamA * 1000)).padStart(3, '0') : '.---';

  if (total === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">⚾</div>下のフォームから選手を登録してください</div>';
    return;
  }
  list.innerHTML = '';
  players.forEach(function (p, i) {
    var row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML =
      '<div class="player-num">' + (i + 1) + '</div>' +
      '<div class="player-info"><div class="player-name">' + p.name + '</div><div class="player-pos">' + posLabel(p.pos) + '</div></div>' +
      '<div style="text-align:right"><div class="player-avg">' + fmtAvg(p) + '</div><div class="avg-label">打率</div></div>' +
      '<button class="delete-btn" onclick="deletePlayer(' + p.id + ', \'' + p.name + '\')">×</button>';
    list.appendChild(row);
  });
}

// ===== 打順生成 =====
function generateLineup() {
  if (players.length === 0) { showToast('まず選手を登録してください'); return; }
  var sorted = players.slice().sort(function (a, b) {
    function score(p) {
      var ab = p.ab || 1;
      return avg(p) * 0.4 + (p.hr / ab) * 0.3 + (p.rbi / ab) * 0.3;
    }
    return score(b) - score(a);
  });
  var lineup = sorted.slice(0, Math.min(9, sorted.length));
  var reason = document.getElementById('aiReason');
  reason.style.display = 'block';
  var html = '<strong>⚾ AIスタメン提案の根拠</strong><br><br>';
  if (lineup[0]) html += '🥇 1番 <strong>' + lineup[0].name + '</strong>：打率最上位、出塁でチャンスメイク<br>';
  if (lineup[1]) html += '2番 <strong>' + lineup[1].name + '</strong>：つなぎ役<br>';
  if (lineup[2]) html += '3番 <strong>' + lineup[2].name + '</strong>：チーム最高の総合力<br>';
  if (lineup[3]) html += '4番 <strong>' + lineup[3].name + '</strong>：HR・打点重視のクリーンナップ<br>';
  if (lineup.length >= 5) html += '5〜' + lineup.length + '番：打率・打点バランスで配置';
  reason.innerHTML = html;

  var ll = document.getElementById('lineupList');
  ll.innerHTML = '';
  document.getElementById('lineupLabel').textContent = 'スタメン打順（AI提案）';
  lineup.forEach(function (p, i) {
    var cls = i===0?'order-1':i===1?'order-2':i===2?'order-3':i===3?'order-4':'order-other';
    var item = document.createElement('div');
    item.className = 'lineup-item';
    item.innerHTML =
      '<div class="order-badge ' + cls + '">' + (i + 1) + '</div>' +
      '<div><div class="lineup-name">' + p.name + '</div><div class="lineup-detail">' + p.pos + ' · HR:' + p.hr + ' 打点:' + p.rbi + '</div></div>' +
      '<div class="lineup-avg">' + fmtAvg(p) + '</div>';
    ll.appendChild(item);
  });
  showToast('打順を生成しました！');
}

// ===== 試合管理 =====
async function loadGames() {
  try {
    games = await sbFetch('games', 'GET');
    renderGameList();
  } catch(e) {
    document.getElementById('gameList').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div>データ読み込みエラー</div>';
  }
}

async function addGame() {
  var opp = document.getElementById('gameOpponent').value.trim();
  var date = document.getElementById('gameDate').value;
  var our = parseInt(document.getElementById('gameOurScore').value);
  var their = parseInt(document.getElementById('gameTheirScore').value);
  var hits = parseInt(document.getElementById('gameHits').value) || 0;
  var errors = parseInt(document.getElementById('gameErrors').value) || 0;
  var memo = document.getElementById('gameMemo').value.trim();

  if (!opp) { showToast('対戦相手を入力してください', true); return; }
  if (isNaN(our) || isNaN(their)) { showToast('得点を入力してください', true); return; }

  var btn = document.getElementById('addGameBtn');
  btn.disabled = true;
  showLoading('試合を記録中...');
  try {
    var result = await sbFetch('games', 'POST', { opp, date: date || new Date().toISOString().split('T')[0], our, their, hits, errors, memo });
    games.unshift(result[0]);
    renderGameList();
    ['gameOpponent','gameDate','gameOurScore','gameTheirScore','gameHits','gameErrors','gameMemo'].forEach(function(id){
      document.getElementById(id).value = '';
    });
    document.getElementById('gameDate').value = new Date().toISOString().split('T')[0];
    showToast('試合を記録しました 🏆');
  } catch(e) {
    showToast('記録に失敗しました', true);
  }
  btn.disabled = false;
  hideLoading();
}

function renderGameList() {
  var list = document.getElementById('gameList');
  if (games.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🏆</div>試合記録がありません</div>';
    return;
  }
  list.innerHTML = '';
  games.forEach(function (g) {
    var win = g.our > g.their;
    var draw = g.our === g.their;
    var resultText = draw ? '引分' : (win ? '勝利' : '敗戦');
    var resultClass = draw ? '' : (win ? 'win' : 'lose');
    var div = document.createElement('div');
    div.className = 'game-log';
    div.innerHTML =
      '<div class="game-header">' +
        '<div><div style="font-size:15px;font-weight:600">vs ' + g.opp + '</div><div class="game-date">' + g.date + '</div></div>' +
        '<div style="text-align:right"><div class="game-score">' + g.our + ' - ' + g.their + '</div><div class="game-result ' + resultClass + '">' + resultText + '</div></div>' +
      '</div>' +
      '<div class="game-body"><div class="game-stats"><span>安打: ' + g.hits + '</span><span>失策: ' + g.errors + '</span>' + (g.memo ? '<span>📝 ' + g.memo + '</span>' : '') + '</div></div>';
    list.appendChild(div);
  });
}

// ===== 動画管理（ローカル保存） =====
function loadVideos() {
  videos = JSON.parse(localStorage.getItem('bbVideos') || '[]');
  renderVideoList();
}

function addVideo() {
  var title = document.getElementById('videoTitle').value.trim();
  var url = document.getElementById('videoUrl').value.trim();
  var memo = document.getElementById('videoMemo').value.trim();

  if (!title) { showToast('タイトルを入力してください', true); return; }
  if (!url) { showToast('URLを入力してください', true); return; }

  var now = new Date();
  var dateStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日';
  videos.unshift({ title, url, memo, date: dateStr });
  localStorage.setItem('bbVideos', JSON.stringify(videos));
  renderVideoList();
  document.getElementById('videoTitle').value = '';
  document.getElementById('videoUrl').value = '';
  document.getElementById('videoMemo').value = '';
  showToast('動画を追加しました 🎬');
}

function renderVideoList() {
  var list = document.getElementById('videoList');
  if (videos.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📹</div>動画がまだありません<br>YouTubeのURLを貼り付けてください</div>';
    return;
  }
  list.innerHTML = '';
  videos.forEach(function (v, i) {
    var item = document.createElement('div');
    item.className = 'video-list-item';
    item.innerHTML =
      '<a href="' + v.url + '" target="_blank" class="video-thumb">▶</a>' +
      '<div class="video-info">' +
        '<div class="video-title">' + v.title + '</div>' +
        '<div class="video-meta">' + v.date + (v.memo ? ' · ' + v.memo : '') + '</div>' +
        '<a href="' + v.url + '" target="_blank" class="video-link">YouTubeで見る →</a>' +
      '</div>';
    list.appendChild(item);
  });
}

document.getElementById('gameDate').value = new Date().toISOString().split('T')[0];
loadPlayers();
loadGames();
loadVideos();
</script>
